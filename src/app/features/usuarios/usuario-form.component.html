<section class="form-card" aria-labelledby="form-title">
  <header>
    <h1 id="form-title">{{ esEdicion() ? 'Editar usuario' : 'Nuevo usuario' }}</h1>
    <a routerLink="/usuarios">← Volver al listado</a>
  </header>

  @if (error(); as mensajeError) {
    <p class="alert alert-error" role="alert">{{ mensajeError }}</p>
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
    <div class="grid">
      <div class="field">
        <label for="nombreUsuario">Nombre de usuario</label>
        <input id="nombreUsuario" type="text" formControlName="nombreUsuario" autocomplete="username" />
        @if (mostrarError('nombreUsuario')) {
          <span class="error-text" role="alert">El usuario debe tener al menos 3 caracteres.</span>
        }
      </div>

      <div class="field">
        <label for="password">
          {{ esEdicion() ? 'Contraseña (dejar vacío para no cambiar)' : 'Contraseña' }}
        </label>
        <input id="password" type="password" formControlName="password" autocomplete="new-password" />
        @if (mostrarError('password')) {
          <span class="error-text" role="alert">La contraseña debe tener al menos 6 caracteres.</span>
        }
      </div>

      <div class="field">
        <label for="rol">Rol</label>
        <select id="rol" formControlName="rol">
          @for (rol of roles; track rol) {
            <option [value]="rol">{{ rol }}</option>
          }
        </select>
      </div>

      <div class="field field-checkbox">
        <label for="activo">
          <input id="activo" type="checkbox" formControlName="activo" />
          Usuario activo
        </label>
      </div>
    </div>

    <div class="actions">
      <button type="submit" [disabled]="form.invalid || enviando()">
        {{ enviando() ? 'Guardando...' : (esEdicion() ? 'Actualizar' : 'Crear') }}
      </button>
    </div>
  </form>
</section>
